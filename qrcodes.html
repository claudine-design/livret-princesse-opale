<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>QR codes — Livret Princesse d'Opale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital@0;1&family=Allura&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 10mm; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Cinzel',serif;
    background:#fff;color:#1a1610;
    padding:10mm;
  }
  .no-print{text-align:center;padding:12px;background:#1a1610;color:#d4af5e;margin-bottom:20px;border-radius:8px}
  .no-print button{background:#d4af5e;color:#1a1610;border:0;padding:10px 24px;font-family:'Cinzel',serif;font-weight:600;border-radius:6px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;font-size:12px}
  @media print { .no-print{display:none} }

  .sheet{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr;
    gap: 8mm;
    width: 100%;
    height: 277mm;
    page-break-after: always;
  }
  .qr{
    border: 2px solid #d4af5e;
    border-radius: 8px;
    padding: 12mm 8mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    text-align: center;
    position: relative;
    background: linear-gradient(160deg, #fffcf3 0%, #fff 70%);
  }
  .qr::before,.qr::after{
    content:"";position:absolute;width:14mm;height:14mm;border:1.5px solid #d4af5e;pointer-events:none
  }
  .qr::before{top:3mm;left:3mm;border-right:0;border-bottom:0}
  .qr::after{bottom:3mm;right:3mm;border-left:0;border-top:0}

  .qr-top, .qr-bottom { width:100%; }

  .brand{
    font-family:'Cinzel',serif;font-size:11pt;color:#8b6d2e;
    letter-spacing:.32em;text-transform:uppercase;margin-bottom:3mm
  }
  .divider{color:#d4af5e;font-size:11pt;margin:2mm 0}
  .appart-com{
    font-family:'Cinzel',serif;font-size:17pt;font-weight:600;color:#1a1610;
    letter-spacing:.05em;text-transform:uppercase;
    margin:3mm 0;line-height:1.2
  }
  .livret-headline{
    font-family:'Cinzel',serif;font-size:22pt;font-weight:600;color:#d4af5e;
    letter-spacing:.14em;text-transform:uppercase;
    margin:5mm 0 0;line-height:1
  }

  .qr-img{
    width: 78mm;height: 78mm;
    margin: 4mm auto;
    background:#fff;padding:3mm;border:1px solid #e4dccc;border-radius:4px;
  }
  .qr-img img,.qr-img canvas{width:100%;height:100%;display:block}

  .tagline{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12pt;color:#555;
    margin-top:3mm;line-height:1.4
  }
  .signature{
    font-family:'Allura',cursive;font-size:20pt;color:#d4af5e;margin-top:2mm
  }
  .site-link{
    font-family:'Cinzel',serif;font-size:9.5pt;color:#8b6d2e;
    letter-spacing:.18em;text-transform:uppercase;
    margin-top:5mm;padding-top:3mm;border-top:1px solid #e4dccc;
  }
</style>
</head>
<body>

<div class="no-print">
  🖨️ <strong>22 QR codes livret d'accueil Princesse d'Opale</strong> — format A4, 2 affiches verticales par page
  &nbsp;&nbsp;&nbsp;
  <button onclick="window.print()">Imprimer / PDF</button>
</div>

<div id="sheets"></div>

<script src="qrious.min.js"></script>
<script>
const BASE_URL = 'https://claudine-design.github.io/livret-princesse-opale/';

if (typeof QRious === 'undefined') {
  document.body.insertAdjacentHTML('afterbegin',
    '<div style="background:#fee;color:#900;padding:16px;margin:10px;border:2px solid #900;border-radius:6px;font-family:sans-serif">' +
    '⚠️ La librairie QR (qrious.min.js) n’a pas pu être chargée. Vérifiez que le fichier est bien à côté de qrcodes.html.' +
    '</div>'
  );
}
const APPARTS = [
  ['kitesurf',      'Kitesurf',         'Kitesurf'],
  ['hamac',         'Hamac',            'Hamac'],
  ['paddle',        'Paddle',           'Paddle'],
  ['surf',          'Surf',             'Surf'],
  ['famille',       'Famille',          '3 Chambres 100m Plage'],
  ['balneo',        'Balnéo',           'Balnéo Garden'],
  ['cocon',         'Cocon Romantique', 'Cocon Romantique'],
  ['terrasse',      'Terrasse',         'La Terrasse'],
  ['maisonnette',   'Maisonnette',      'Cœur de Berck'],
  ['facemer',       'Face Mer',         'Face Mer Esplanade'],
  ['grandlarge',    'Grand Large',      'Hamac Face Mer'],
  ['apolove',       'Apolove',          'Suite Romantique Face Mer'],
  ['apollo',        'Apollo',           'Panoramique 2 Chambres'],
  ['kingston',      'Kingston',         'Face Mer Exceptionnel'],
  ['reserve',       'La Réserve',       'La Réserve'],
  ['albatros',      'Albatros',         'Hamac Chic Vue Mer'],
  ['miniloveroom',  'Mini Love Room',   'Balnéo Face Mer'],
  ['grandeloveroom','Grande Love Room', 'Romantique Face Mer'],
  ['jeanne',        'Jeanne',           'Cœur des Sables'],
  ['evasion',       'Évasion',          "L'Évasion Balnéo & Sauna"],
  ['rotonde',       'Rotonde',          'La Rotonde du Bien-être'],
  ['patio',         'Patio',            'Patio Romantique Chic'],
];

const host = document.getElementById('sheets');

// 2 QR codes par sheet A4
for (let i = 0; i < APPARTS.length; i += 2) {
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  for (let j = 0; j < 2; j++) {
    const ap = APPARTS[i+j];
    if (!ap) {
      const empty = document.createElement('div');
      empty.className = 'qr';
      empty.style.visibility = 'hidden';
      sheet.appendChild(empty);
      continue;
    }
    const [slug, nom, com] = ap;
    const card = document.createElement('div');
    card.className = 'qr';
    card.innerHTML = `
      <div class="qr-top">
        <div class="brand">Princesse d'Opale</div>
        <div class="divider">❦ ❦ ❦</div>
        <div class="appart-com">${com}</div>
        <div class="livret-headline">Livret d'accueil</div>
      </div>
      <div class="qr-img" id="qr-${slug}"></div>
      <div class="qr-bottom">
        <div class="tagline">Scannez pour ouvrir votre<br>livret d'accueil numérique</div>
        <div class="signature">— Claudine</div>
        <div class="site-link">appart-hotel-berck.com</div>
      </div>
    `;
    sheet.appendChild(card);
    // Générer QR (QRious — bibliothèque self-hostée)
    if (typeof QRious !== 'undefined') {
      try {
        const canvas = document.createElement('canvas');
        new QRious({
          element: canvas,
          value: BASE_URL + '?a=' + slug,
          size: 500,
          foreground: '#1a1610',
          background: '#ffffff',
          padding: 8,
          level: 'M'
        });
        const img = new Image();
        img.src = canvas.toDataURL('image/png');
        card.querySelector(`#qr-${slug}`).appendChild(img);
      } catch(e) {
        card.querySelector(`#qr-${slug}`).textContent = 'QR ' + slug;
      }
    }
  }
  host.appendChild(sheet);
}
</script>

</body>
</html>
