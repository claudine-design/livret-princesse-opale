<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>QR codes — Livret Princesse d'Opale</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital@0;1&family=Allura&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 10mm; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Cinzel',serif;
    background:#fff;color:#1a1610;
    padding:10mm;
  }
  .no-print{text-align:center;padding:12px;background:#1a1610;color:#d4af5e;margin-bottom:20px;border-radius:8px}
  .no-print button{background:#d4af5e;color:#1a1610;border:0;padding:10px 24px;font-family:'Cinzel',serif;font-weight:600;border-radius:6px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;font-size:12px}
  @media print { .no-print{display:none} }

  .sheet{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8mm;
    width: 100%;
    height: 270mm;
    page-break-after: always;
  }
  .qr{
    border: 1.5px solid #d4af5e;
    border-radius: 6px;
    padding: 8mm 6mm;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
    background: linear-gradient(160deg, #fffcf3 0%, #fff 70%);
  }
  .qr::before,.qr::after{
    content:"";position:absolute;width:10mm;height:10mm;border:1px solid #d4af5e;pointer-events:none
  }
  .qr::before{top:2mm;left:2mm;border-right:0;border-bottom:0}
  .qr::after{bottom:2mm;right:2mm;border-left:0;border-top:0}

  .brand{
    font-family:'Cinzel',serif;font-size:10pt;color:#8b6d2e;
    letter-spacing:.3em;text-transform:uppercase;margin-bottom:2mm
  }
  .divider{color:#d4af5e;font-size:10pt;margin:1mm 0}
  .appart-nom{
    font-family:'Cinzel',serif;font-size:18pt;font-weight:600;color:#1a1610;
    letter-spacing:.08em;text-transform:uppercase;margin:2mm 0
  }
  .appart-com{
    font-family:'Cormorant Garamond',serif;font-style:italic;color:#8b6d2e;font-size:13pt;
    margin-bottom:3mm
  }
  .qr-img{
    width: 58mm;height: 58mm;margin: 2mm auto;
    background:#fff;padding:3mm;border:1px solid #e4dccc;border-radius:4px;
  }
  .qr-img img{width:100%;height:100%;display:block}
  .tagline{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11pt;color:#555;
    margin-top:2mm;line-height:1.3
  }
  .signature{
    font-family:'Allura',cursive;font-size:16pt;color:#d4af5e;margin-top:1mm
  }
</style>
</head>
<body>

<div class="no-print">
  🖨️ <strong>22 QR codes livret d'accueil Princesse d'Opale</strong> — format A4, 4 par page
  &nbsp;&nbsp;&nbsp;
  <button onclick="window.print()">Imprimer / PDF</button>
</div>

<div id="sheets"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const BASE_URL = 'https://claudine-design.github.io/livret-princesse-opale/';
const APPARTS = [
  ['kitesurf',      'Kitesurf',         'Kitesurf'],
  ['hamac',         'Hamac',            'Hamac'],
  ['paddle',        'Paddle',           'Paddle'],
  ['surf',          'Surf',             'Surf'],
  ['famille',       'Famille',          '3 Chambres 100m Plage'],
  ['balneo',        'Balnéo',           'Balnéo Garden'],
  ['cocon',         'Cocon Romantique', 'Cocon Romantique'],
  ['terrasse',      'Terrasse',         'La Terrasse'],
  ['maisonnette',   'Maisonnette',      'Cœur de Berck'],
  ['facemer',       'Face Mer',         'Face Mer Esplanade'],
  ['grandlarge',    'Grand Large',      'Hamac Face Mer'],
  ['apolove',       'Apolove',          'Suite Romantique Face Mer'],
  ['apollo',        'Apollo',           'Panoramique 2 Chambres'],
  ['kingston',      'Kingston',         'Face Mer Exceptionnel'],
  ['reserve',       'La Réserve',       'La Réserve'],
  ['albatros',      'Albatros',         'Hamac Chic Vue Mer'],
  ['miniloveroom',  'Mini Love Room',   'Balnéo Face Mer'],
  ['grandeloveroom','Grande Love Room', 'Romantique Face Mer'],
  ['jeanne',        'Jeanne',           'Cœur des Sables'],
  ['evasion',       'Évasion',          "L'Évasion Balnéo & Sauna"],
  ['rotonde',       'Rotonde',          'La Rotonde du Bien-être'],
  ['patio',         'Patio',            'Patio Romantique Chic'],
];

const host = document.getElementById('sheets');

// 4 QR codes par sheet A4
for (let i = 0; i < APPARTS.length; i += 4) {
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  for (let j = 0; j < 4; j++) {
    const ap = APPARTS[i+j];
    if (!ap) {
      const empty = document.createElement('div');
      empty.className = 'qr';
      empty.style.visibility = 'hidden';
      sheet.appendChild(empty);
      continue;
    }
    const [slug, nom, com] = ap;
    const card = document.createElement('div');
    card.className = 'qr';
    card.innerHTML = `
      <div>
        <div class="brand">Princesse d'Opale</div>
        <div class="divider">❦ ❦ ❦</div>
        <div class="appart-nom">${nom}</div>
        <div class="appart-com">${com}</div>
      </div>
      <div class="qr-img" id="qr-${slug}"></div>
      <div>
        <div class="tagline">Scannez pour ouvrir votre<br>livret d'accueil numérique</div>
        <div class="signature">— Claudine</div>
      </div>
    `;
    sheet.appendChild(card);
    // Générer QR
    const url = BASE_URL + '?a=' + slug;
    QRCode.toCanvas(document.createElement('canvas'), url, { width: 500, margin: 1, color: { dark: '#1a1610', light: '#ffffff' } }, (err, canvas) => {
      if (!err) {
        const img = new Image();
        img.src = canvas.toDataURL('image/png');
        card.querySelector(`#qr-${slug}`).appendChild(img);
      }
    });
  }
  host.appendChild(sheet);
}
</script>

</body>
</html>
